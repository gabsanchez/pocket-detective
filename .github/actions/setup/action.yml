name: Setup
description: Checkout, install Node.js, install dependencies, and generate Prisma client

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: npm

    - run: npm ci
      shell: bash

    - run: npx prisma generate
      shell: bash
      env:
        DATABASE_URL: postgresql://user:pass@localhost:5432/testdb
